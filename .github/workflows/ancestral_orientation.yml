name: Chimp Ancestral Orientation

# Multi-outgroup, no-drop polarization of every inversion's ancestral vs derived
# orientation. For each locus we compare the human reference arrangement against
# the chimp, gorilla, orangutan and macaque outgroups (UCSC hg38-vs-* net AXT +
# all.chain) and root by phylogenetically weighted parsimony. The convention is
# project-wide: orientation 0 == "direct" == ANCESTRAL, 1 == "inverted" ==
# DERIVED (inverted == derived w.r.t. chimp). No inversion is dropped; loci with
# no usable ape orthology are flagged confidence=assumed rather than discarded.
#
# Output: data/inversion_polarity.tsv (the single source of truth consumed by
# stats/_inv_common.is_flipped and scripts/apply_polarity.py).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/ancestral_orientation.yml'
      - 'stats/polarize_orientation.py'

permissions:
  contents: write

jobs:
  polarize:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Download UCSC outgroup net AXT + chain alignments
        run: |
          set -euo pipefail
          base="http://hgdownload.soe.ucsc.edu/goldenpath/hg38"
          dl() { curl -fSL --retry 3 -o "$2" "$1"; ls -la "$2"; }
          dl "$base/vsPanTro6/hg38.panTro6.net.axt.gz"   hg38.panTro6.net.axt.gz
          dl "$base/vsPanTro6/hg38.panTro6.all.chain.gz" hg38.panTro6.all.chain.gz
          dl "$base/vsGorGor6/hg38.gorGor6.net.axt.gz"   hg38.gorGor6.net.axt.gz
          dl "$base/vsGorGor6/hg38.gorGor6.all.chain.gz" hg38.gorGor6.all.chain.gz
          dl "$base/vsPonAbe3/hg38.ponAbe3.net.axt.gz"   hg38.ponAbe3.net.axt.gz
          dl "$base/vsPonAbe3/hg38.ponAbe3.all.chain.gz" hg38.ponAbe3.all.chain.gz
          dl "$base/vsRheMac10/hg38.rheMac10.net.axt.gz" hg38.rheMac10.net.axt.gz
          dl "$base/vsRheMac10/hg38.rheMac10.all.chain.gz" hg38.rheMac10.all.chain.gz

      - name: Collect alignment evidence (stream nets + chains)
        run: python stats/polarize_orientation.py collect

      - name: Decide ancestral/derived orientation (multi-outgroup parsimony)
        run: python stats/polarize_orientation.py decide

      - name: Show result table head
        run: |
          echo "Rows: $(($(wc -l < data/inversion_polarity.tsv) - 1))"
          head -20 data/inversion_polarity.tsv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inversion-polarity
          path: data/inversion_polarity.tsv

      - name: Commit refreshed polarity table
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/inversion_polarity.tsv; then
            git add data/inversion_polarity.tsv
            git commit -m "Refresh inversion_polarity.tsv (multi-outgroup polarization)"
            git push
          else
            echo "inversion_polarity.tsv unchanged."
          fi
