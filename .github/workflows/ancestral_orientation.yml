name: Chimp Ancestral Orientation

# Multi-outgroup, no-drop polarization of every inversion's ancestral vs derived
# orientation. For each locus we compare the human reference arrangement against
# the chimp, gorilla, orangutan and macaque outgroups (UCSC hg38-vs-* net AXT +
# all.chain) and root by phylogenetically weighted parsimony. The convention is
# project-wide: orientation 0 == "direct" == ANCESTRAL, 1 == "inverted" ==
# DERIVED (inverted == derived w.r.t. chimp). No inversion is dropped; loci with
# no usable ape orthology are flagged confidence=assumed rather than discarded.
#
# Output: data/inversion_polarity.tsv (the single source of truth consumed by
# stats/_inv_common.is_flipped and scripts/apply_polarity.py).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/ancestral_orientation.yml'
      - 'stats/polarize_orientation_v2.py'
      - 'stats/polarize_v2_experiment.py'
      - 'stats/integrate_gold_polarity.py'
      - 'data/apes2025_t2t_polarity.tsv'
      - 'data/strandseq_polarity.tsv'

permissions:
  contents: write

jobs:
  polarize:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h /

      - name: Download UCSC outgroup chains (reciprocal-best + all)
        run: |
          set -euo pipefail
          base="https://hgdownload.soe.ucsc.edu/goldenpath/hg38"
          mkdir -p aln_rbest aln_all
          dl() { curl -fSL --retry 3 -o "$2" "$1"; ls -la "$2"; }
          # reciprocal-best (paralog/SD-filtered) primary + all-chains fallback.
          # Named hg38.<sp>.all.chain.gz in each dir so the v2 caller resolves them.
          declare -A LC=( [PanTro6]=panTro6 [GorGor6]=gorGor6 [PonAbe3]=ponAbe3 [RheMac10]=rheMac10 )
          for SP in PanTro6 GorGor6 PonAbe3 RheMac10; do
            lc="${LC[$SP]}"
            dl "$base/vs$SP/reciprocalBest/hg38.$lc.rbest.chain.gz" "aln_rbest/hg38.$lc.all.chain.gz"
            dl "$base/vs$SP/hg38.$lc.all.chain.gz"                  "aln_all/hg38.$lc.all.chain.gz"
          done

      - name: Compute ancestral/derived orientation (flank-relative v2)
        run: |
          python stats/polarize_orientation_v2.py \
            --aln-rbest aln_rbest --aln-all aln_all \
            --out data/inversion_polarity.tsv

      - name: Overlay gold-standard evidence (T2T apes + Strand-seq + deep-OG)
        run: |
          # The v2 synteny call is only ~53% accurate vs the Strand-seq gold standard
          # and cannot resolve deep-toggling loci (17q21.31, 8p23.1). Layer the
          # committed assembly/Strand-seq gold tables on top, by fixed precedence, so
          # the regenerated table REPRODUCES the gold-integrated source of truth
          # instead of reverting it. Idempotent: re-running reproduces the table.
          python stats/integrate_gold_polarity.py \
            --base data/inversion_polarity.tsv \
            --out data/inversion_polarity.tsv

      - name: Show result table head
        run: |
          echo "Rows: $(($(wc -l < data/inversion_polarity.tsv) - 1))"
          head -20 data/inversion_polarity.tsv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inversion-polarity
          path: data/inversion_polarity.tsv

      - name: Commit refreshed polarity table
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/inversion_polarity.tsv; then
            git add data/inversion_polarity.tsv
            git commit -m "Refresh inversion_polarity.tsv (multi-outgroup polarization)"
            # Rebase + retry so a concurrent figure-manifest/CDS bot commit landing on
            # main does not fail this push with a non-fast-forward error (the failure
            # mode that previously left this workflow red).
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || true
              if git push; then
                echo "Pushed on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; retrying after pull..."
              sleep 5
            done
          else
            echo "inversion_polarity.tsv unchanged."
          fi
