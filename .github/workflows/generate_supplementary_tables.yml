name: Generate supplementary tables

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas xlsxwriter tqdm

      - name: Download best tagging SNP results artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Never hard-fail on a missing/expired cross-workflow artifact: the canonical
          # data/best_tagging_snps_qvalues.tsv is committed in the repo (present from
          # checkout). Try to REFRESH it from the latest successful batch run, but fall back
          # to the committed copy. Only error if neither exists.
          set -uo pipefail
          mkdir -p data

          echo "Locating latest successful batch_best_tagging_snps.yml run ..."
          RUN_ID=$(gh run list --workflow batch_best_tagging_snps.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)

          if [[ -n "${RUN_ID:-}" ]] && gh run download "$RUN_ID" -n best-tagging-snps-results --dir data/best-tagging-snps-results 2>/dev/null; then
            CANDIDATE=""
            if [[ -f "data/best-tagging-snps-results/best_tagging_snps_qvalues.tsv" ]]; then
              CANDIDATE="data/best-tagging-snps-results/best_tagging_snps_qvalues.tsv"
            elif [[ -f "data/best-tagging-snps-results/data/best_tagging_snps_qvalues.tsv" ]]; then
              CANDIDATE="data/best-tagging-snps-results/data/best_tagging_snps_qvalues.tsv"
            fi
            if [[ -n "$CANDIDATE" ]]; then
              mv "$CANDIDATE" data/best_tagging_snps_qvalues.tsv
              echo "✓ Refreshed best_tagging_snps_qvalues.tsv from run $RUN_ID."
            else
              echo "::warning::Artifact downloaded but file not found in expected locations; using committed copy."
            fi
          else
            echo "::warning::No fresh best-tagging-snps-results artifact (missing/expired run); using committed data/best_tagging_snps_qvalues.tsv."
          fi

          if [[ ! -f data/best_tagging_snps_qvalues.tsv ]]; then
            echo "::error::No best_tagging_snps_qvalues.tsv available (neither a fresh artifact nor a committed copy)."
            exit 1
          fi
          echo "Using best_tagging_snps_qvalues.tsv ($(wc -l < data/best_tagging_snps_qvalues.tsv) lines)."

      - name: Generate supplementary tables workbook
        run: |
          python stats/generate_tables.py --output web/figures-site/public/downloads/supplementary_tables.xlsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload supplementary tables artifact
        uses: actions/upload-artifact@v4
        with:
          name: supplementary-tables
          path: web/figures-site/public/downloads/supplementary_tables.xlsx
          if-no-files-found: error
